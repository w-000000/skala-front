<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="SKALA-FRONT 회원가입 페이지"
    >

    <title>회원가입</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            color: #25324a;
            font-family: Arial, sans-serif;
            background-color: #eef4fb;
        }

        main {
            width: 750px;
            max-width: 100%;
            margin: 0 auto;
            padding: 40px;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(51, 85, 130, 0.18);
        }

        h1 {
            margin-top: 0;
            color: #365f98;
            text-align: center;
        }

        .description {
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.7;
        }

        fieldset {
            margin-bottom: 25px;
            padding: 25px;
            border: 1px solid #cbd9e8;
            border-radius: 14px;
        }

        legend {
            padding: 0 10px;
            color: #365f98;
            font-size: 18px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            border: 1px solid #b8c9dc;
            border-radius: 8px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid #92b8e2;
            border-color: #365f98;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .inline-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .inline-group label {
            display: inline;
            margin: 0;
            font-weight: normal;
        }

        .inline-group input {
            width: auto;
            margin-right: 5px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            min-width: 130px;
            padding: 13px 20px;
            font-size: 16px;
            font-weight: bold;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
        }

        button[type="submit"] {
            color: white;
            background-color: #365f98;
        }

        button[type="submit"]:hover {
            background-color: #284b7c;
        }

        button[type="reset"] {
            color: #25324a;
            background-color: #dfe9f4;
        }

        button[type="reset"]:hover {
            background-color: #cddbeb;
        }

        .home-link {
            margin-top: 30px;
            text-align: center;
        }

        .home-link a {
            color: #315b91;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            main {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main>
        <h1>🧑‍💻 회원가입</h1>

        <p class="description">
            SKALA-FRONT 회원가입을 위해 아래 정보를 입력해 주세요.
        </p>

        <form action="signUpResult.html" method="get">
            <fieldset>
                <legend>계정 정보</legend>

                <div class="form-group">
                    <label for="userId">아이디</label>
                    <input
                        type="text"
                        id="userId"
                        name="userId"
                        placeholder="사용할 아이디를 입력하세요"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="비밀번호를 입력하세요"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="passwordCheck">비밀번호 확인</label>
                    <input
                        type="password"
                        id="passwordCheck"
                        name="passwordCheck"
                        placeholder="비밀번호를 다시 입력하세요"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@email.com"
                        required
                    >
                </div>
            </fieldset>

            <fieldset>
                <legend>개인 정보</legend>

                <div class="form-group">
                    <label for="name">이름</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="이름을 입력하세요"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="birth">생년월일</label>
                    <input
                        type="date"
                        id="birth"
                        name="birth"
                    >
                </div>

                <div class="form-group">
                    <label for="phone">전화번호</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="010-0000-0000"
                    >
                </div>

                <div class="form-group">
                    <label for="region">거주 지역</label>
                    <select id="region" name="region">
                        <option value="">지역을 선택하세요</option>
                        <option value="seoul">서울특별시</option>
                        <option value="busan">부산광역시</option>
                        <option value="gwangju">광주광역시</option>
                        <option value="daejeon">대전광역시</option>
                        <option value="jeonju">전주시</option>
                        <option value="other">기타</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>관심 분야</legend>

                <div class="form-group">
                    <p><strong>관심 있는 분야를 선택하세요.</strong></p>

                    <div class="inline-group">
                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="web"
                            >
                            웹 개발
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="ai"
                            >
                            인공지능
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="data"
                            >
                            데이터 분석
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="cloud"
                            >
                            클라우드
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="git"
                            >
                            Git
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <p><strong>개발 경험이 있나요?</strong></p>

                    <div class="inline-group">
                        <label>
                            <input
                                type="radio"
                                name="experience"
                                value="yes"
                                required
                            >
                            있음
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="experience"
                                value="no"
                            >
                            없음
                        </label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>프로필 링크</legend>

                <div class="form-group">
                    <label for="github">GitHub 주소</label>
                    <input
                        type="url"
                        id="github"
                        name="github"
                        placeholder="https://github.com/아이디"
                    >
                </div>

                <div class="form-group">
                    <label for="blog">블로그 주소</label>
                    <input
                        type="url"
                        id="blog"
                        name="blog"
                        placeholder="https://"
                    >
                </div>

                <div class="form-group">
                    <label for="portfolio">포트폴리오 주소</label>
                    <input
                        type="url"
                        id="portfolio"
                        name="portfolio"
                        placeholder="https://"
                    >
                </div>
            </fieldset>

            <fieldset>
                <legend>추가 정보</legend>

                <div class="form-group">
                    <label for="joinPath">가입 경로</label>
                    <select id="joinPath" name="joinPath">
                        <option value="">가입 경로를 선택하세요</option>
                        <option value="search">인터넷 검색</option>
                        <option value="friend">친구 추천</option>
                        <option value="school">학교 또는 교육기관</option>
                        <option value="sns">SNS</option>
                        <option value="other">기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="introduction">자기소개</label>
                    <textarea
                        id="introduction"
                        name="introduction"
                        placeholder="자신을 간단하게 소개해 주세요"
                    ></textarea>
                </div>

                <div class="form-group">
                    <div class="inline-group">
                        <label>
                            <input
                                type="checkbox"
                                name="agreement"
                                value="agree"
                                required
                            >
                            개인정보 수집 및 이용에 동의합니다.
                        </label>
                    </div>
                </div>
            </fieldset>

            <div class="button-group">
                <button type="submit">회원가입</button>
                <button type="reset">다시 작성</button>
            </div>
        </form>

        <p class="home-link">
            <a href="index.html">홈으로 돌아가기</a>
        </p>
    </main>
</body>
</html>
