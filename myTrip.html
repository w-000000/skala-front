<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="임창우의 여행 사진과 음악, 영상을 소개하는 페이지"
    >

    <title>나의 여행지</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="trip-page">
    <header>
        <h1>🌍 나의 여행 앨범</h1>

        <p>
            기억에 남는 여행 사진과 음악, 영상을 소개합니다.
        </p>
    </header>

    <main>
        <section>
            <h2>🎵 여행할 때 듣는 음악</h2>

            <audio controls autoplay loop>
                <source
                    src="media/music.mp3"
                    type="audio/mpeg"
                >

                현재 브라우저에서는 오디오를 재생할 수 없습니다.
            </audio>

            <p class="media-note">
                브라우저 설정에 따라 자동재생이 차단될 수 있습니다.
                이 경우 재생 버튼을 눌러주세요.
            </p>
        </section>

        <section>
            <h2>📸 기억에 남는 여행지</h2>

            <figure>
                <img
                    src="media/australia.jpg"
                    alt="호주의 여행 풍경"
                    loading="lazy"
                >

                <figcaption>
                    호주 — 넓은 자연과 여유로운 분위기
                </figcaption>
            </figure>

            <figure>
                <img
                    src="media/croatia.jpeg"
                    alt="크로아티아의 여행 풍경"
                    loading="lazy"
                >

                <figcaption>
                    크로아티아 — 아름다운 바다와 유럽의 거리
                </figcaption>
            </figure>

            <figure>
                <img
                    src="media/malaysia.jpg"
                    alt="말레이시아의 여행 풍경"
                    loading="lazy"
                >

                <figcaption>
                    말레이시아 — 다양한 문화와 활기찬 도시
                </figcaption>
            </figure>

            <figure>
                <img
                    src="media/vietnam.jpeg"
                    alt="베트남의 여행 풍경"
                    loading="lazy"
                >

                <figcaption>
                    베트남 — 맛있는 음식과 매력적인 거리
                </figcaption>
            </figure>
        </section>

        <section>
            <h2>🎬 크로아티아 여행 영상</h2>

            <video controls>
                <source
                    src="media/croatia_travel.mp4"
                    type="video/mp4"
                >

                현재 브라우저에서는 영상을 재생할 수 없습니다.
            </video>

            <p>
                크로아티아 여행 중 촬영한 풍경과 추억을 영상으로 기록했습니다.
            </p>
        </section>
    </main>

    <footer>
        <p>
            <a href="index.html">홈으로 돌아가기</a>
        </p>
    </footer>
</body>
</html>
