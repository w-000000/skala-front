<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="SKALA-FRONT 회원가입 완료 페이지"
    >
    <title>회원가입 결과</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: #25324a;
            font-family: Arial, sans-serif;
            background-color: #eef4fb;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        main {
            width: 700px;
            max-width: 100%;
            padding: 40px;

            background-color: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(51, 85, 130, 0.18);
        }

        h1 {
            margin-top: 0;
            color: #365f98;
            letter-spacing: 1px;
        }

        h2 {
            margin-top: 32px;
            color: #365f98;
        }

        p,
        li {
            line-height: 1.8;
        }

        hr {
            border: 0;
            border-top: 1px solid #d5e0ec;
            margin: 28px 0;
        }

        .link-list {
            padding-left: 22px;
        }

        a {
            color: #315b91;
            font-weight: bold;
        }

        .home-link {
            margin-top: 35px;
            text-align: center;
        }
    </style>
</head>

<body>
    <main>
        <header>
            <h1>🎉 회원가입을 진심으로 축하합니다!</h1>

            <p>
                SKALA-FRONT 회원이 되신 것을 환영합니다.
            </p>
        </header>

        <hr>

        <section>
            <h2>안내 사항</h2>

            <ul>
                <li>
                    입력하신 이메일 주소로 가입 확인 메일이 발송되었습니다.
                </li>

                <li>
                    보안을 위해 첫 로그인 후 비밀번호를 다시 확인해 주세요.
                </li>

                <li>
                    작성한 프로필 정보는 마이페이지에서 언제든지 수정할 수 있습니다.
                </li>
            </ul>
        </section>

        <section>
            <h2>이동하기</h2>

            <p>
                아래 링크를 클릭하면 이전에 작성한 페이지로 이동할 수 있습니다.
            </p>

            <ul class="link-list">
                <li>
                    <a href="myProfile.html">👤 나의 프로필 보기</a>
                </li>

                <li>
                    <a href="myClass.html">🗓️ 나의 강의 시간표 보기</a>
                </li>

                <li>
                    <a href="myHoliday.html">🏖️ 나의 휴일 일과 보기</a>
                </li>

                <li>
                    <a href="myTrip.html">🌍 나의 여행 앨범 보기</a>
                </li>
            </ul>
        </section>

        <hr>

        <p class="home-link">
            <a href="index.html">홈으로 돌아가기</a>
        </p>
    </main>
</body>
</html>
